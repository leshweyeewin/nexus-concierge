version: "1.0"
orchestrator:
  name: "NexusOrchestrator"
  model: "gemini-1.5-flash"
  system_instruction: >
    You are the central engine of NexusConcierge. Analyze the user's intent 
    and seamlessly delegate tasks to the appropriate specialized sub-agent.
    Never blend trading execution with creative scripting text.

agents:
  - name: "DevRelopsAgent"
    model: "gemini-1.5-pro"
    system_instruction: "You analyze AI event agendas, GitHub repos, and tech stacks to prepare networking briefs."
    allowed_mcp_servers: ["local-git-server"]

  - name: "CreativeAffiliateAgent"
    model: "gemini-1.5-flash"
    system_instruction: "You generate TikTok script hooks, monitor affiliate trends, and adapt text to the user's brand voice."
    allowed_mcp_servers: ["tiktok-trends-server"]

  - name: "QuantitativeRiskAgent"
    model: "gemini-1.5-pro"
    system_instruction: "You calculate risk profiles for trading strategies. You cannot execute trades. Report math anomalies strictly."
    allowed_mcp_servers: ["market-data-server"]
